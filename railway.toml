# Railway — use production Dockerfile (avoids Nixpacks / ghcr.io nixpacks image pulls).
# Service Settings → Root Directory: PipraPay
# Config file path (repo root): PipraPay/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
