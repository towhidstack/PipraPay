# Coolify/Nixpacks — PHP only (no Node). First build: 5–15 min on VPS (Nix downloads).
# Faster rebuilds: enable Docker layer cache, or use Build Pack "Dockerfile".

providers = ["php"]

[variables]
NIXPACKS_PHP_VERSION = "8.3"
NIXPACKS_PHP_ROOT_DIR = "/app"
UPLOAD_MAX_FILESIZE = "100M"
POST_MAX_SIZE = "100M"

# ext-imagick in composer.json also pulls php83Extensions.imagick
[phases.setup]
nixPkgs = ["...", "php83Extensions.imagick"]

[phases.install]
cmds = [
    "mkdir -p pp-media/storage",
    "chmod +x docker/coolify-start.sh docker/write-pp-config-from-env.sh 2>/dev/null || true",
]

[start]
cmd = "bash /app/docker/coolify-start.sh"
