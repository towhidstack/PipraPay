# Dokploy/Nixpacks — PHP only (no Node). Prefer Dockerfile on Dokploy for faster rebuilds.

providers = ["php"]

[variables]
NIXPACKS_PHP_VERSION = "8.3"
NIXPACKS_PHP_ROOT_DIR = "/app"
UPLOAD_MAX_FILESIZE = "100M"
POST_MAX_SIZE = "100M"

# ext-imagick in composer.json also pulls php83Extensions.imagick
[phases.setup]
nixPkgs = ["...", "php83Extensions.imagick"]

[phases.install]
cmds = [
    "mkdir -p pp-media/storage",
    "chmod +x docker/bootstrap.sh docker/bootstrap-log.sh docker/detect-php-user.sh docker/secure-pp-config.sh docker/fix-storage-permissions.sh docker/piprapay-config-persist.sh docker/production-start.sh docker/write-pp-config-from-env.sh 2>/dev/null || true",
]

[start]
cmd = "bash /app/docker/production-start.sh"
