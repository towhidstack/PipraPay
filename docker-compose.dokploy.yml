# Reference compose for local testing (Dokploy normally uses UI + Dockerfile per app).
# Not required for Dokploy Git deploy.

services:
  piprapay:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: piprapaydb
      DB_USERNAME: piprapay
      DB_PASSWORD: piprapay
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - piprapay-media:/app/pp-media/storage

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: piprapaydb
      MARIADB_USER: piprapay
      MARIADB_PASSWORD: piprapay
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - piprapay-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  piprapay-media:
  piprapay-db:
